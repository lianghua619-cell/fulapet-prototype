<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>福拉呼啦-近期活动</title>
  <link rel="stylesheet" href="assets/common.css?v=3">
  <link rel="stylesheet" href="assets/gallery-preview.css?v=3">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
    .page { padding-bottom:96px; padding-top:120px; }
    .filter-tabs { position:fixed; top:62px; left:50%; transform:translateX(-50%); width:375px; display:flex; gap:8px; padding:10px 16px; background:var(--brochure-blue); z-index:3; }
    .filter-tabs::after { content:""; position:absolute; bottom:0; left:0; right:0; height:8px; background:linear-gradient(180deg,rgba(0,0,0,.08),transparent); pointer-events:none; }
    .filter-tabs::-webkit-scrollbar { display:none; }
    .filter-tab { flex:1; padding:9px 14px; border:3px solid var(--line-green); border-radius:18px 24px 18px 22px; background:var(--paper); color:var(--brochure-blue-deep); font-size:13px; font-weight:900; box-shadow:0 3px 0 rgba(39,97,138,.12); text-align:center; }
    .filter-tab.active { background:var(--green); color:var(--brochure-blue-deep); border-color:rgba(246,243,223,.6); }
    .featured-card { overflow:hidden; border-radius:30px 22px 32px 24px; background:var(--paper); border:5px solid var(--green); box-shadow:var(--shadow-paper); }
    .featured-photo { position:relative; overflow:hidden; height:166px; display:grid; place-items:center; background:#EAF4F7; color:var(--brochure-blue-deep); font-size:13px; font-weight:950; }
    .featured-photo img { width:100%; height:100%; display:block; object-fit:cover; }
    .featured-photo::before { content:""; position:absolute; top:14px; left:50%; width:58px; height:14px; border-radius:999px; background:rgba(255,251,234,.78); transform:translateX(-50%) rotate(-5deg); z-index:2; }
    .featured-photo.rescue-banner { display:block; border:none; border-radius:0; }
    .featured-photo.rescue-banner::before { display:none; }
    .featured-photo.rescue-banner .banner-slider { display:flex; transition:transform 0.6s ease; height:100%; }
    .featured-photo.rescue-banner .banner-slide { min-width:100%; }
    .featured-photo.rescue-banner .banner-slide img { width:100%; height:100%; object-fit:contain; background:#f5f5f5; }
    .featured-photo.rescue-banner .banner-dots { display:flex; justify-content:center; gap:6px; position:absolute; bottom:8px; left:0; right:0; z-index:3; }
    .featured-photo.rescue-banner .banner-dots span { width:8px; height:8px; border-radius:999px; background:rgba(255,255,255,.5); cursor:pointer; transition:all 0.3s; }
    .featured-photo.rescue-banner .banner-dots span.active { background:#fff; width:20px; }
    .featured-body { padding:14px; }
    .tag { display:inline-flex; padding:6px 10px; border-radius:18px 24px 18px 22px; background:var(--green); color:var(--brochure-blue-deep); border:2px solid rgba(255,255,255,.48); font-size:11px; font-weight:950; }
    .featured-body h2 { margin-top:10px; font-size:17px; font-weight:950; color:var(--ink); }
    .featured-body p { margin-top:7px; color:var(--text-sub); font-size:13px; line-height:1.55; font-weight:650; }
    .activity-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .activity-card { position:relative; overflow:hidden; border-radius:22px 16px 24px 18px; background:var(--paper); border:3px solid var(--line-green); box-shadow:0 5px 0 rgba(39,97,138,.1); cursor:pointer; }
    .activity-card::before { content:""; position:absolute; top:8px; left:38%; width:34px; height:10px; border-radius:999px; background:rgba(255,251,234,.74); transform:rotate(-5deg); z-index:2; }
    .activity-photo { height:112px; overflow:hidden; display:grid; place-items:center; background:#EAF4F7; border-bottom:3px solid var(--green); color:var(--brochure-blue-deep); font-size:12px; font-weight:900; text-align:center; }
    .activity-photo img { width:100%; height:100%; display:block; object-fit:cover; }
    .activity-info { padding:10px; }
    .activity-info span { display:inline-flex; padding:4px 7px; border-radius:14px 18px 14px 16px; background:var(--green-soft); color:var(--green-dark); border:1px solid rgba(110,157,40,.2); font-size:10px; font-weight:950; }
    .activity-info h3 { margin-top:8px; font-size:13px; font-weight:950; line-height:1.35; }
    .activity-info p { margin-top:5px; color:var(--text-sub); font-size:11px; line-height:1.45; font-weight:650; }
    .note-card { padding:14px; border-radius:20px 16px 22px 18px; background:var(--paper); border:3px solid var(--line-green); color:var(--text-sub); font-size:13px; line-height:1.6; font-weight:650; }
    .modal { position:fixed; inset:0; z-index:8; display:none; align-items:center; justify-content:center; background:rgba(17,24,39,.68); }
    .modal.show { display:flex; }
    .modal-card { width:300px; padding:16px; border-radius:26px 20px 28px 22px; background:var(--paper); border:4px solid var(--green); box-shadow:var(--shadow-paper); }
    .modal-photo { height:220px; overflow:hidden; display:grid; place-items:center; border-radius:20px 16px 22px 18px; background:#EAF4F7; border:4px solid var(--green); color:var(--brochure-blue-deep); font-size:13px; font-weight:950; }
    .modal-photo img { width:100%; height:100%; display:block; object-fit:cover; }
    .modal-card h3 { margin-top:12px; font-size:17px; font-weight:950; }
    .modal-card p { margin-top:6px; color:var(--text-sub); font-size:13px; font-weight:650; }
    .modal-card button { margin-top:14px; width:100%; height:40px; border:0; border-radius:16px 22px 16px 20px; background:var(--brochure-blue); color:#fff; font-size:14px; font-weight:950; }
    .tab-content { scroll-margin-top:120px; }
    .photo-scroll { display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; padding-bottom:8px; }
    .photo-scroll::-webkit-scrollbar { display:none; }
    .scroll-item { flex:0 0 140px; border-radius:16px; overflow:hidden; border:3px solid var(--green); }
    .scroll-item img { width:100%; height:100px; object-fit:cover; display:block; }
    .welfare-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .welfare-grid .featured-card { margin:0; }
    .welfare-card { border-radius:18px 14px 20px 16px; background:var(--paper); border:3px solid var(--line-green); overflow:hidden; }
    .welfare-photo { height:100px; overflow:hidden; }
    .welfare-photo img { width:100%; height:100%; object-fit:cover; display:block; }
    .welfare-info { padding:10px; }
    .tag-sm { display:inline-flex; padding:3px 6px; border-radius:10px; background:var(--green-soft); color:var(--green-dark); font-size:9px; font-weight:900; }
    .welfare-info h3 { margin-top:6px; font-size:12px; font-weight:950; }
    .welfare-info p { margin-top:4px; color:var(--text-sub); font-size:10px; line-height:1.4; font-weight:600; }
    .section-title h2 { display:inline-block; }
    .welfare-section-card { padding:16px; border-radius:24px 18px 26px 20px; background:var(--paper); border:3px solid var(--line-green); box-shadow:0 5px 0 rgba(39,97,138,.1); }
    .welfare-section-title { font-size:13px; font-weight:950; color:var(--brochure-blue-deep); margin-bottom:10px; }
    .pet-scroll { display:flex; gap:10px; overflow-x:auto; overflow-y:hidden; scrollbar-width:none; padding:8px 0; -webkit-overflow-scrolling:touch; margin:0 -16px; padding-left:16px; padding-right:16px; }
    .pet-scroll::-webkit-scrollbar { display:none; }
    .pet-item { flex:0 0 100px; text-align:center; }
    .pet-item .pet-photo { width:100px; height:100px; border-radius:16px; overflow:hidden; border:3px solid var(--green); }
    .pet-item .pet-photo img { width:100%; height:100%; object-fit:cover; display:block; }
    .pet-item .pet-name { margin-top:6px; font-size:11px; font-weight:900; color:var(--brochure-blue-deep); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .rescue-banner { position:relative; border-radius:22px 16px 24px 18px; overflow:hidden; background:#EAF4F7; border:4px solid var(--green); }
    .rescue-banner .banner-slider { display:flex; transition:transform 0.6s ease; }
    .rescue-banner .banner-slide { min-width:100%; }
    .rescue-banner .banner-slide img { width:100%; height:180px; object-fit:cover; display:block; }
    .rescue-banner .banner-dots { display:flex; justify-content:center; gap:6px; position:absolute; bottom:8px; left:0; right:0; }
    .rescue-banner .banner-dots span { width:8px; height:8px; border-radius:999px; background:rgba(255,255,255,.5); cursor:pointer; transition:all 0.3s; }
    .rescue-banner .banner-dots span.active { background:#fff; width:20px; }
    .pet-detail-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid rgba(139,187,58,.12); font-size:12px; }
    .pet-detail-label { font-weight:900; color:var(--brochure-blue-deep); }
    .rescue-text { margin-top:12px; padding:14px; border-radius:18px 14px 20px 16px; background:var(--paper); border:3px solid var(--line-green); }
    .rescue-text h3 { font-size:14px; font-weight:950; color:var(--brochure-blue-deep); }
    .rescue-text p { margin-top:8px; color:var(--text-sub); font-size:12px; line-height:1.6; font-weight:600; }
    .pet-item .pet-photo { width:100px; height:100px; border-radius:16px; overflow:hidden; border:3px solid var(--green); }
    .pet-item .pet-photo img { width:100%; height:100%; object-fit:cover; display:block; }
    .pet-item .pet-name { margin-top:6px; font-size:11px; font-weight:900; color:var(--brochure-blue-deep); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    @media (max-width:428px){ .filter-tabs{ width:100vw; } }
    @media (max-width:414px){ .filter-tabs{ width:100vw; } }
    @media (max-width:375px){ .filter-tabs{ width:100vw; } }
  </style>
</head>

  <script src="assets/component-loader.js?v=3"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      ComponentLoader.setActiveTab('activity.html');

      // 救助经历轮播
      const slider = document.getElementById('rescue-slider');
      const dots = document.querySelectorAll('#rescue-dots span');
      let current = 0;
      const total = dots.length;
      function goToSlide(n) {
        current = n;
        slider.style.transform = 'translateX(-' + (current * 100) + '%)';
        dots.forEach((d, i) => d.classList.toggle('active', i === current));
      }
      setInterval(() => { goToSlide((current + 1) % total); }, 3000);
      dots.forEach((dot, i) => {
        dot.addEventListener('click', () => goToSlide(i));
      });

      // 待领养轮播
      const petSlider = document.getElementById('pet-slider');
      const petDots = document.querySelectorAll('#pet-dots span');
      window.petCurrent = 0;
      const petTotal = petDots.length;
      const petNames = ['康康','奶牛','小耳朵','Jason','天宝','饼饼'];
      function goToPetSlide(n) {
        petCurrent = n;
        petSlider.style.transform = 'translateX(-' + (petCurrent * 100) + '%)';
        petDots.forEach((d, i) => d.classList.toggle('active', i === petCurrent));
        document.querySelector('#tab-welfare .featured-card:first-child .featured-body h2').textContent = petNames[petCurrent];
      }
      setInterval(() => { goToPetSlide((petCurrent + 1) % petTotal); }, 2500);
      petDots.forEach((dot, i) => {
        dot.addEventListener('click', () => goToPetSlide(i));
      });

      // 待领养图片列表
      window.petImages = [
        'assets/images/pets/1、康康.jpg',
        'assets/images/pets/2、奶牛.jpg',
        'assets/images/pets/3、小耳朵.jpg',
        'assets/images/pets/4、Jason.jpg',
        'assets/images/pets/5、天宝.jpg',
        'assets/images/pets/6、饼饼.jpg'
      ];

      window.petDetails = {

      // 走失寻主轮播
      const lostSlider = document.getElementById('lost-slider');
      const lostDots = document.querySelectorAll('#lost-dots span');
      let lostCurrent = 0;
      const lostTotal = lostDots.length;
      function goToLostSlide(n) {
        lostCurrent = n;
        lostSlider.style.transform = 'translateX(-' + (lostCurrent * 100) + '%)';
        lostDots.forEach((d, i) => d.classList.toggle('active', i === lostCurrent));
      }
      setInterval(() => { goToLostSlide((lostCurrent + 1) % lostTotal); }, 3000);
      lostDots.forEach((dot, i) => {
        dot.addEventListener('click', () => goToLostSlide(i));
      });
    });

  <script>
    const tabs = document.querySelectorAll('.filter-tab');
    const tabContents = document.querySelectorAll('.tab-content');
    // 默认显示第一个标签
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(item => item.classList.remove('active'));
        tab.classList.add('active');
        const filter = tab.dataset.filter;
        const target = document.getElementById('tab-' + filter);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  </script>
