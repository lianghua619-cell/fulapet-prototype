<div class="step"><b>1</b><div><h3>添加客服微信</h3><p>通过微信说明宠物情况与服务需求。</p></div></div>
<div class="step"><b>2</b><div><h3>说明宠物情况</h3><p>提供服务时间、地点、宠物性格与健康状态。</p></div></div>
<div class="step"><b>3</b><div><h3>沟通服务方案</h3><p>客服根据宠物情况、服务时间与所在区域协助判断。</p></div></div>
<div class="step"><b>4</b><div><h3>确认服务安排</h3><p>服务前建立沟通群，同步注意事项与准备内容。</p></div></div>
<div class="step"><b>5</b><div><h3>服务开始并反馈</h3><p>服务中与服务后同步照片、视频或文字反馈。</p></div></div>
