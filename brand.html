<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>福拉呼啦宠物-品牌故事</title>
  <link rel="stylesheet" href="assets/common.css">
  <link rel="stylesheet" href="assets/gallery-preview.css">
  <style>
    .page { padding-bottom:96px; padding-top:62px; }
    .page-header { position:relative; z-index:2; }
    .brand-hero { margin:14px 16px 0; }
    .brand-photo { height:174px; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-radius:30px 22px 30px 24px; background:#EAF4F7; border:5px solid var(--green); color:var(--brochure-blue-deep); font-size:13px; font-weight:950; box-shadow:0 7px 0 rgba(39,97,138,.13); }
    .brand-photo img { width:100%; height:100%; display:block; object-fit:cover; }
    .brand-photo span { position:absolute; left:14px; bottom:12px; padding:6px 10px; border-radius:16px 20px 16px 18px; background:rgba(255,251,234,.9); color:var(--brochure-blue-deep); border:2px solid var(--green); font-size:12px; font-weight:950; }
    .brand-card { position:relative; margin:-32px 14px 0; padding:17px; border-radius:24px 18px 26px 20px; background:var(--paper); border:4px solid var(--green); box-shadow:var(--shadow-paper); }
    .brand-card::after { content:""; position:absolute; right:22px; top:18px; width:26px; height:20px; border-radius:50% 50% 45% 45%; background:rgba(182,220,98,.55); box-shadow:-13px -7px 0 -6px rgba(182,220,98,.55),0 -12px 0 -7px rgba(182,220,98,.55),13px -7px 0 -6px rgba(182,220,98,.55); }
    .brand-card span { display:inline-flex; padding:6px 10px; border-radius:18px 24px 18px 22px; background:var(--green); color:var(--brochure-blue-deep); border:2px solid rgba(255,255,255,.48); font-size:11px; font-weight:950; }
    .brand-card h2 { margin-top:10px; font-size:20px; line-height:1.32; font-weight:950; color:var(--brochure-blue-deep); }
    .brand-card p { margin-top:8px; color:var(--text-sub); font-size:13px; line-height:1.65; font-weight:650; }
    .stat, .team-card, .role { background:var(--paper); border:3px solid var(--line-green); box-shadow:0 5px 0 rgba(39,97,138,.1); }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat { padding:14px 8px; border-radius:20px 15px 22px 17px; text-align:center; }
    .stat strong { display:block; color:var(--brochure-blue); font-size:23px; font-weight:950; }
    .stat span { display:block; margin-top:6px; color:var(--ink); font-size:11px; line-height:1.35; font-weight:800; }
    .team-card { padding:16px; border-radius:24px 18px 26px 20px; }
    .team-photo { height:132px; overflow:hidden; display:grid; place-items:center; border-radius:22px 16px 22px 18px; background:#EAF4F7; border:4px solid var(--green); color:var(--brochure-blue-deep); font-size:13px; font-weight:950; }
    .team-photo img { width:100%; height:100%; display:block; object-fit:cover; }
    .team-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:12px; }
    .role { padding:12px; border-radius:18px 14px 18px 16px; background:var(--paper-light); }
    .role h3 { font-size:13px; font-weight:950; }
    .role p { margin-top:5px; color:var(--text-sub); font-size:12px; line-height:1.45; font-weight:650; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="page">
      <div id="topbar-container"></div>

      <section class="page-header">
        <h1>品牌故事</h1>
        <p>从公益救助经验出发，提供宠物医疗陪护、上门服务、寄养等照护支持。</p>
      </section>

      <section class="brand-hero">
        <div class="brand-photo"><img src="assets/images/brand/team-1.jpg" alt="福拉呼啦服务团队合影"><span>福拉呼啦服务团队</span></div>
        <div class="brand-card">
          <span>FulaFla Pets</span>
          <h2>对生命的温柔守护</h2>
          <p>您托付的不只是宠物，更是家人与心底的牵挂。福拉呼啦希望用稳定、清晰、可反馈的服务流程，守护每一个生命。</p>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><h2>公益沉淀</h2></div>
        <div class="stats">
          <div class="stat"><strong>8年</strong><span>公益救助背景</span></div>
          <div class="stat"><strong>500+</strong><span>救助与领养</span></div>
          <div class="stat"><strong>3类</strong><span>核心照护服务</span></div>
        </div>
      </section>

      <section class="section">
        <div class="section-title"><h2>团队与标准</h2></div>
        <div class="team-card">
          <div class="team-photo"><img src="assets/images/brand/team-2.jpg" alt="福拉呼啦团队现场记录"></div>
          <div class="team-grid">
            <div class="role"><h3>服务沟通</h3><p>确认需求、服务范围与照护建议。</p></div>
            <div class="role"><h3>照护执行</h3><p>按约定流程进行陪护、上门或寄养照护。</p></div>
            <div class="role"><h3>过程反馈</h3><p>同步关键节点，异常情况及时沟通。</p></div>
            <div class="role"><h3>公益协作</h3><p>持续参与救助与正确养宠传播。</p></div>
          </div>
        </div>
      </section>


    </div>

    <div id="float-contact-container"></div>
    <div id="tabbar-container"></div>
  </main>
  <script src="assets/component-loader.js"></script>
  <script src="assets/gallery-preview.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      ComponentLoader.setActiveTab('brand.html');
    });
  </script>
</body>
</html>
